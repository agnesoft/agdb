db_name: agdb_server_benchmarks.agdb
targets:
  embedded: true
  local_server:
    address: http://localhost:3000
    admin_username: admin
    admin_password: admin
  remote_server:
db_type: file_mapped
server:
  allow_invalid_certs: false
  retry:
    base_delay_ms: 100
    max_delay_ms: 5000
    max_consecutive_failures: 10
  memory_poll_interval_ms: 2000
  memory_end_delay_ms: 15000
locale: cs
padding: 20
cell_padding: 10
posters:
  count: 10
  posts: 100
  delay_ms: 100
  title: Title of the testing post
  body: Body of the testing post should be longer than the title
commenters:
  count: 10
  comments: 100
  delay_ms: 100
  body: This is a testing comment of a post.
post_readers:
  count: 100
  posts: 10
  reads_per_reader: 100
  delay_ms: 100
comment_readers:
  count: 100
  comments: 10
  reads_per_reader: 100
  delay_ms: 100
