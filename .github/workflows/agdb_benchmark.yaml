name: agdb_benchmark

on:
  pull_request:
    branches: ["main"]
    paths:
      - agdb_benchmark/**
      - agdb/**
      - agdb_derive/**
      - agdb_server/**
      - agdb_api/rust/**
      - .github/workflows/agdb_benchmark.yaml

jobs:
  agdb_benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt,clippy
      - run: cargo fmt -p agdb_benchmark --check
      - run: cargo clippy -p agdb_benchmark --all-targets --all-features -- -D warnings
      - run: cargo run -p agdb_benchmark -r
        working-directory: agdb_benchmark

  agdb_server_benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: ./agdb_server_benchmark.sh
        working-directory: agdb_benchmark
